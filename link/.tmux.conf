# reload config
unbind r
bind r source-file ~/.tmux.conf

set-option -g status-position top
set -g default-terminal "tmux-256color"

# set leader
set -g prefix C-s

# enable mouse
set -g mouse on

# copy and paste
set -g @yank_action 'copy-pipe'

# vim like pane nav
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_window_status_style "rounded"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"

# catppuccin config
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

# --> Catppuccin (Mocha)
set -ogq @thm_bg "#101010"
set -ogq @thm_fg "#f5f5f5"

# Colors
set -ogq @thm_rosewater "#ff8080"
set -ogq @thm_flamingo "#ff8080"
set -ogq @thm_pink "#ff8080"
set -ogq @thm_mauve "#65737e"

set -ogq @thm_red "#ff8080"
set -ogq @thm_maroon "#ff8080"
set -ogq @thm_peach "#ffc799"
set -ogq @thm_yellow "#ffcfa8"
set -ogq @thm_green "#6ad0b7"
set -ogq @thm_teal "#99ffe4"
set -ogq @thm_sky "#65737e"
set -ogq @thm_sapphire "#65737e"
set -ogq @thm_blue "#65737e"
set -ogq @thm_lavender "#65737e"

# Surfaces and overlays
set -ogq @thm_subtext_1 "#312d2a"
set -ogq @thm_subtext_0 "#312d2a"
set -ogq @thm_overlay_2 "#312d2a"
set -ogq @thm_overlay_1 "#312d2a"
set -ogq @thm_overlay_0 "#312d2a"
set -ogq @thm_surface_2 "#312d2a"
set -ogq @thm_surface_1 "#242525"
set -ogq @thm_surface_0 "#242525"
set -ogq @thm_mantle "#101010" # status line bg
set -ogq @thm_crust "#161616"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
