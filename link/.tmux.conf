# reload config
unbind r
bind r source-file ~/.tmux.conf

# pass throught
set -g allow-passthrough on
set -ga terminal-features ",*:hyperlinks"
set -ga terminal-features ",*:extkeys"

# true color support
set -as terminal-overrides ",*:Tc"

# keep escape delay low, while still allowing split escape sequences to parse
set -sg escape-time 10

# allow neovim FocusGained/FocusLost events
set -g focus-events on

# enable extended keys (Ctrl+Shift+... combos)
set -g extended-keys on

# enable vim mode
set-window-option -g mode-keys vi

# clear scrollback (prefix + C-l to avoid stealing C-l from neovim)
bind C-l send-keys -R \; clear-history

set-option -g status-position top
set -g default-terminal "tmux-256color"

# start windows from 1
set -g base-index 1

# renumber windows after deleting one
set -g renumber-windows on

# set leader
set -g prefix C-s

# enable mouse
set -g mouse on

# copy and paste (exit copy-mode after mouse-drag selection)
set -g @yank_action 'copy-pipe-and-cancel'

# vim like pane nav
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# pane width resize (prefix + 9 / prefix + 0), repeatable
bind-key -r 9 resize-pane -L 2
bind-key -r 0 resize-pane -R 2

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

# theme
color_fg="#f5f5f5"
color_fg_accent="#ffcfa8"
color_fg_green="#6ad0b7"
color_bg="#161616"
color_bg_light="#242525"
color_border="#282828"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-style "fg=${color_fg},bg=default"
set -g status-left "#[fg=${color_fg_accent},bold,bg=${color_bg}] [󰇥 #S] "
set -g status-right "#[bg=${color_bg}]  #h "
# bell: monitor background windows, auto-clear on focus
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

set -g window-status-bell-style ""
set -g window-status-current-format "#[bg=${color_bg},fg=${color_fg_green}] #I:#W "
set -g window-status-format "#[bg=${color_bg}] #I:#W#{?window_bell_flag, #[fg=red]●#[default],} "
set -g message-style "fg=${color_fg},bg=default"
set -g mode-style "fg=${color_fg_accent},bg=${color_bg_light}"
set -g pane-border-style "fg=${color_border}"
set -g pane-active-border-style "fg=${color_fg_green}"
set -g window-status-separator ''

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
